<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {{isdef title}} <meta name="twitter:title" content="{{fill title}}" />  {{end}}
  <meta name="twitter:creator" content="@HeblingVieira" />
  <meta name="twitter:domain" content="bhvieira.github.io" />
  <script data-goatcounter="https://bhvieira.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
  {{if hasmath}} {{insert head_katex.html }}     {{end}}
  {{if hascode}} {{insert head_highlight.html }}   {{end}}
  {{insert style.html}}
  {{isdef has_mlvisualizer}}
  <link rel="stylesheet" href="/css/mlvisualizer-custom.css">
  <script>
    window.tailwind = window.tailwind || {};
    window.tailwind.config = {
      corePlugins: {
        preflight: false
      }
    };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  {{end}}
  {{isdef redirect}}
  <link rel="canonical" href="{{fill redirect}}">
  <meta http-equiv="refresh" content="0; url={{fill redirect}}">
  <meta name="robots" content="noindex">
  <script>
    const redirectTarget = document.querySelector('link[rel="canonical"]')?.getAttribute('href');
    if (redirectTarget) {
      window.location.replace(redirectTarget);
    }
  </script>
  {{end}}
  {{isdef title}} <title>{{fill title}}</title>  {{end}}
  <!-- end custom head snippets -->
</head>
{{insert body_layout.html}}

<!-- Content appended here -->
